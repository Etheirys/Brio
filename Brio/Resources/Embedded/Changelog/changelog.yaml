        icon: ""
        items:
          - "As a reminder! If you experience any issues please report them on Discord or on GitHub"
          - "(yes, this time for real, more features coming real soon! I promise!)"
          - "P.S. I'm sick, someone send me Nyquil"

      - number: "0.7.2.1"
        icon: ""
        items:
          - "Tried to fix the plugin installer from adding duplicate injuries of Brio"
          - "Tried to fix the head from twitching when moving other bones"
          - "Fixed the Gismo in the transform window from disappearing in certain situations"
          - "Fixed hair color in the customization options from not being quite correct (it's still not right for Hrothgar')"
     
      - number: "0.7.2"
        icon: ""
        items:
          - "Update Brio to support FFXIV 7.5"
          - "Removed `SkinGloss` and `HairGloss` (thanks SE)"
          - "Rendering brio actors is now significantly faster (In some cases you now get 10x pef in large crowds)"
          - "Facewear now works properly!"
          - "There is now a `lock camera button` on the camera widget.\n\tPlease tell me what you think about it (thanks SolarisFFXIV)"
          - "A yellow line now emanates from certain light types. (thanks SolarisFFXIV)"
          - "Smaller changes across Brio, I will talk about them once 0.8.0 comes out soon"

